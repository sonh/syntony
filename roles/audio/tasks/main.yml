---
- name: Ensure PipeWire drop-in directory exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/pipewire/pipewire.conf.d"
    state: directory
    mode: '0755'

- name: Remove stale full pipewire.conf override
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/pipewire/pipewire.conf"
    state: absent
  register: pipewire_conf_removed

- name: Configure high-res clock rate via PipeWire drop-in
  copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/pipewire/pipewire.conf.d/10-high-res.conf"
    mode: '0644'
    content: |
      context.properties = {
          default.clock.rate = 192000
          default.clock.allowed-rates = [ 44100 48000 88200 96000 176400 192000 ]
      }
  register: pipewire_dropin

- name: Ensure WirePlumber drop-in directory exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/wireplumber/wireplumber.conf.d"
    state: directory
    mode: '0755'

- name: Pin EDIFIER S880DB MKII to analog-stereo profile (24/192 capable)
  copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/wireplumber/wireplumber.conf.d/51-edifier-profile.conf"
    mode: '0644'
    content: |
      monitor.alsa.rules = [
          {
              matches = [
                  { device.name = "alsa_card.usb-EDIFIER_EDIFIER_S880DB_MKII-00" }
              ]
              actions = {
                  update-props = {
                      api.acp.auto-profile = false
                      device.profile        = "output:analog-stereo"
                  }
              }
          }
      ]
  register: wireplumber_dropin

- name: Restart Audio Services
  systemd:
    name: "{{ item }}"
    state: restarted
    scope: user
  loop:
    - pipewire
    - wireplumber
  when: pipewire_conf_removed.changed or pipewire_dropin.changed or wireplumber_dropin.changed
